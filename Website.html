<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorilla Tag Tournaments</title>

<style>
body { margin:0; font-family:Arial; background:#0a0a0a; color:#eaeaea; }
#site { display:none; }

body.phone { font-size:20px; }
body.pc { font-size:16px; }

/* START SCREEN */
#startScreen {
  position:fixed; inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.startBtn {
  width:260px;
  padding:20px;
  margin:10px;
  font-size:1.2rem;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  cursor:pointer;
}
.startBtn:hover { background:#333; }

/* HEADER */
header {
  padding:25px;
  text-align:center;
  background:#141414;
}

/* SECTIONS */
.section {
  padding:20px;
  max-width:1100px;
  margin:auto;
}
.card {
  background:#111;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

/* INPUTS */
input, button, textarea {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}
input[type=number] { width:60px; text-align:center; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}
body.phone .grid { grid-template-columns:1fr; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}
td, th {
  padding:10px;
  border-bottom:1px solid #333;
  text-align:center;
}

/* ADMIN */
#adminPanel { display:none; }

/* TOAST */
#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#222;
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
</style>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY");
})();
</script>

</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>Select Platform</h1>
  <button class="startBtn" onclick="setPlatform('phone')">Phone</button>
  <button class="startBtn" onclick="setPlatform('pc')">Computer</button>
</div>

<div id="site">

<header>
  <h1>Gorilla Tag Tournaments</h1>
</header>

<!-- PUBLIC TOURNAMENT INFO -->
<div class="section">
  <div class="card">
    <h2>Next Tournament</h2>
    <p>Date: <span id="publicDate">Not set</span></p>
    <p>Time: <span id="publicTime">Not set</span></p>
    <p><strong>Your Local Time:</strong> <span id="localTime">--</span></p>
    <p><strong>Starts In:</strong> <span id="countdown">--</span></p>
    <p id="publicNotes">No info yet</p>
  </div>
</div>

<!-- PLATFORM -->
<div class="section">
  <div class="card">
    <button onclick="resetPlatform()">Reset Platform</button>
  </div>
</div>

<!-- REGISTER -->
<div class="section grid">
  <div class="card" style="grid-column:span 2;">
    <h2>Register</h2>
    <input id="email" placeholder="Email">
    <input id="team" placeholder="Team Name">
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- SCOREBOARD -->
<div class="section">
  <h2>Scoreboard</h2>
  <table id="scoreTable"></table>
</div>

<!-- ADMIN LOGIN -->
<div class="section">
  <div class="card">
    <input id="adminPass" type="password" placeholder="Admin Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="section">
  <div class="card">
    <button onclick="toggleEdit()">Edit Scoreboard</button>
    <button onclick="createTournament()">Create Tournament</button>
    <button onclick="clearTeams()">Clear Teams</button>
    <button onclick="endTournament()">End Tournament</button>

    <h3>Tournament Info</h3>
    <input id="tournamentDate" type="date">
    <input id="tournamentTime" type="time">
    <textarea id="tournamentNotes" placeholder="Info..."></textarea>
    <button onclick="saveTournamentInfo()">Save Info</button>
  </div>

  <div class="card">
    <h3>Teams</h3>
    <table>
      <tbody id="teamsTable"></tbody>
    </table>
  </div>
</div>

</div>

<div id="toast"></div>

<script>

/* PLATFORM */
function setPlatform(type){
  localStorage.setItem("platform",type);
  document.body.className=type;
  start();
}
function resetPlatform(){
  localStorage.removeItem("platform");
  location.reload();
}
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("site").style.display="block";
}
(function(){
  const saved=localStorage.getItem("platform");
  if(saved){ document.body.className=saved; start(); }
})();

/* TOAST */
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,2000);
}

/* DATA */
let teams=JSON.parse(localStorage.getItem("teams"))||[];
let tournament=JSON.parse(localStorage.getItem("tournament"))||null;
let tournamentInfo=JSON.parse(localStorage.getItem("tournamentInfo"))||{};
let editing=false;
let isAdmin=false;

function save(){
  localStorage.setItem("teams",JSON.stringify(teams));
  localStorage.setItem("tournament",JSON.stringify(tournament));
  localStorage.setItem("tournamentInfo",JSON.stringify(tournamentInfo));
}

/* REGISTER + EMAIL */
function register(){
  const email=document.getElementById("email").value;
  const team=document.getElementById("team").value||"No Name";
  if(!email) return alert("Enter email");

  teams.push({id:Date.now(),team,email});
  save(); render(); updateTeams();

  emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
    to_email: email,
    team_name: team,
    tournament_date: tournamentInfo.date,
    tournament_time: tournamentInfo.time
  }).then(()=>toast("Registered + Email Sent!"))
    .catch(()=>toast("Registered (Email failed)"));
}

/* ADMIN */
function login(){
  if(document.getElementById("adminPass").value==="GTag#9xL!2Qz@7"){
    isAdmin=true;
    document.getElementById("adminPanel").style.display="block";
    toast("Logged in!");
  }
}
function toggleEdit(){ if(!isAdmin)return; editing=!editing; render(); }
function createTournament(){
  tournament={matches:[]};
  for(let i=0;i<teams.length;i+=2){
    tournament.matches.push({team1:teams[i],team2:teams[i+1],s1:0,s2:0});
  }
  save(); render();
}
function endTournament(){ tournament=null; save(); render(); }
function clearTeams(){ teams=[]; tournament=null; save(); render(); updateTeams(); }

/* TOURNAMENT INFO */
function saveTournamentInfo(){
  tournamentInfo.date=document.getElementById("tournamentDate").value;
  tournamentInfo.time=document.getElementById("tournamentTime").value;
  tournamentInfo.notes=document.getElementById("tournamentNotes").value;
  save();
  updatePublic();
  toast("Saved!");
}

/* PUBLIC + TIMEZONE + COUNTDOWN */
function updatePublic(){
  document.getElementById("publicDate").innerText=tournamentInfo.date||"Not set";
  document.getElementById("publicTime").innerText=tournamentInfo.time||"Not set";
  document.getElementById("publicNotes").innerText=tournamentInfo.notes||"No info yet";
}

function updateTime(){
  if(!tournamentInfo.date || !tournamentInfo.time) return;

  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const eventDate = new Date(tournamentInfo.date+"T"+tournamentInfo.time);

  document.getElementById("localTime").innerText =
    eventDate.toLocaleString([], {timeZone:tz});

  const diff = eventDate - new Date();
  if(diff<=0){ document.getElementById("countdown").innerText="Started!"; return; }

  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff/3600000)%24;
  const m=Math.floor(diff/60000)%60;
  const s=Math.floor(diff/1000)%60;

  document.getElementById("countdown").innerText =
    `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateTime,1000);

/* SCOREBOARD */
function render(){
  const table=document.getElementById("scoreTable");
  table.innerHTML="";
  if(!tournament) return;

  tournament.matches.forEach((m,i)=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${m.team1?.team||"TBD"}</td>
      <td><input type="number" value="${m.s1}" ${editing?"":"disabled"}></td>
      <td>vs</td>
      <td><input type="number" value="${m.s2}" ${editing?"":"disabled"}></td>
      <td>${m.team2?.team||"TBD"}</td>
      <td>${isAdmin?`<button onclick="setWinner(${i})">Set Winner</button>`:""}</td>
    `;

    const inputs=tr.querySelectorAll("input");
    if(inputs[0]) inputs[0].oninput=()=>{ m.s1=parseInt(inputs[0].value)||0; save(); };
    if(inputs[1]) inputs[1].oninput=()=>{ m.s2=parseInt(inputs[1].value)||0; save(); };

    table.appendChild(tr);
  });
}

/* WINNER */
function setWinner(i){
  if(!isAdmin) return;
  const m=tournament.matches[i];
  if(m.s1===m.s2) return alert("Draw!");
  alert((m.s1>m.s2?m.team1.team:m.team2.team)+" wins!");
}

/* TEAMS */
function updateTeams(){
  const t=document.getElementById("teamsTable");
  t.innerHTML="";
  teams.forEach((team,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${team.team}</td><td>${team.email}</td>
    <td><button onclick="teams.splice(${i},1);save();render();updateTeams()">Delete</button></td>`;
    t.appendChild(tr);
  });
}

/* INIT */
render();
updateTeams();
updatePublic();

</script>
</body>
</html>
