<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorilla Tag Tournaments</title>

<style>

/* BASE */
body {
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#eaeaea;
}

/* HIDE SITE UNTIL SELECTED */
#site {
  display:none;
}

/* PLATFORM MODES */
body.phone { font-size:20px; }
body.pc { font-size:16px; }

/* START SCREEN (SEPARATE PAGE) */
#startScreen {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#startScreen h1 {
  font-size:2rem;
  margin-bottom:30px;
}

.startBtn {
  width:250px;
  padding:20px;
  margin:10px;
  font-size:1.2rem;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  cursor:pointer;
}

.startBtn:hover {
  background:#333;
}

/* HEADER */
header {
  padding:25px;
  text-align:center;
  background:linear-gradient(180deg,#141414,#0a0a0a);
}

header h1 {
  font-size:2rem;
}

/* SECTION */
.section {
  padding:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

body.phone .grid {
  grid-template-columns:1fr;
}

/* CARD */
.card {
  background:#111;
  padding:20px;
  border-radius:16px;
}

/* INPUTS */
input, button {
  width:100%;
  padding:16px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #333;
  background:#111;
  color:white;
}

body.phone input,
body.phone button {
  padding:20px;
  font-size:1.2rem;
}

/* REMOVE NUMBER SPINNER */
input[type=number] {
  width:70px;
  text-align:center;
  -moz-appearance:textfield;
}

input[type=number]::-webkit-inner-spin-button {
  -webkit-appearance:none;
}

/* BRACKETS */
#brackets {
  display:flex;
  gap:20px;
}

body.phone #brackets {
  flex-direction:column;
}

.bracket {
  background:#111;
  padding:15px;
  border-radius:12px;
  flex:1;
}

.match {
  background:#222;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
}

/* ADMIN */
#adminPanel {
  display:none;
}

</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>Select Platform</h1>
  <button class="startBtn" onclick="setPlatform('phone')">Phone</button>
  <button class="startBtn" onclick="setPlatform('pc')">Computer</button>
</div>

<!-- MAIN SITE -->
<div id="site">

<header>
  <h1>Gorilla Tag Tournaments</h1>
</header>

<!-- PLATFORM SETTINGS -->
<div class="section">
  <div class="card">
    <h3>Platform Settings</h3>
    <button onclick="resetPlatform()">Reset Platform Selection</button>
  </div>
</div>

<!-- REGISTER -->
<div class="section grid">
  <div class="card" style="grid-column: span 2;">
    <h2>Register</h2>
    <input id="email" placeholder="Email">
    <input id="team" placeholder="Team Name">
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- BRACKET -->
<div class="section">
  <h2>Bracket</h2>
  <div id="brackets">
    <div class="bracket">
      <h3>Winner</h3>
      <div id="winner"></div>
    </div>
    <div class="bracket">
      <h3>Loser</h3>
      <div id="loser"></div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="section">
  <div class="card">
    <input id="adminPass" placeholder="Admin Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="adminPanel" class="section">
  <div class="card">
    <button onclick="toggleEdit()">Edit ScoreBoard</button>
    <button onclick="createTournament()">Create Tournament</button>
    <button onclick="clearTeams()">Clear Teams</button>
  </div>
</div>

</div>

<script>

/* PLATFORM */
function setPlatform(type){
  localStorage.setItem("platform", type);
  document.body.className = type;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("site").style.display="block";
}

function resetPlatform(){
  localStorage.removeItem("platform");
  location.reload();
}

/* CHECK SAVED PLATFORM */
(function(){
  const saved = localStorage.getItem("platform");
  if(saved){
    document.body.className = saved;
    document.getElementById("startScreen").style.display="none";
    document.getElementById("site").style.display="block";
  }
})();

/* DATA */
let teams = JSON.parse(localStorage.getItem("teams")) || [];
let tournament = JSON.parse(localStorage.getItem("tournament")) || null;

let editing = false;

/* SAVE */
function save(){
  localStorage.setItem("teams", JSON.stringify(teams));
  localStorage.setItem("tournament", JSON.stringify(tournament));
}

/* REGISTER */
function register(){
  const email = document.getElementById("email").value;
  const team = document.getElementById("team").value || "No Name";

  if(!email) return alert("Enter email");

  teams.push({id:Date.now(), team, email});
  save();
  generateMatches();
  render();
}

/* ADMIN */
function login(){
  if(document.getElementById("adminPass").value==="admin"){
    document.getElementById("adminPanel").style.display="block";
  }
}

function toggleEdit(){
  editing = !editing;
  render();
}

/* TOURNAMENT */
function createTournament(){
  tournament = {matches:[]};
  generateMatches();
  save();
  render();
}

function clearTeams(){
  teams = [];
  tournament = null;
  save();
  render();
}

/* MATCHES */
function generateMatches(){
  if(!tournament) return;
  tournament.matches = [];

  for(let i=0;i<teams.length;i+=2){
    tournament.matches.push({
      team1:teams[i]?.id,
      team2:teams[i+1]?.id,
      score1:0,
      score2:0
    });
  }
}

/* RENDER */
function render(){
  const w = document.getElementById("winner");
  w.innerHTML = "";

  if(!tournament) return;

  tournament.matches.forEach(m=>{
    const t1 = teams.find(t=>t.id===m.team1);
    const t2 = teams.find(t=>t.id===m.team2);

    const div = document.createElement("div");
    div.className="match";

    const s1 = document.createElement("input");
    s1.type="number";
    s1.value=m.score1;
    s1.disabled=!editing;
    s1.oninput=()=>{ m.score1=parseInt(s1.value)||0; save(); };

    const s2 = document.createElement("input");
    s2.type="number";
    s2.value=m.score2;
    s2.disabled=!editing;
    s2.oninput=()=>{ m.score2=parseInt(s2.value)||0; save(); };

    div.appendChild(document.createTextNode((t1?.team||"TBD")+" "));
    div.appendChild(s1);
    div.appendChild(document.createTextNode(" vs "+(t2?.team||"TBD")+" "));
    div.appendChild(s2);

    w.appendChild(div);
  });
}

/* INIT */
render();

</script>

</body>
</html>
