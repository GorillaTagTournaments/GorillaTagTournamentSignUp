<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorilla Tag Tournaments</title>

<style>
body { margin:0; font-family:Arial; background:#0a0a0a; color:#eaeaea; }

header {
  padding:30px 15px;
  text-align:center;
  background:linear-gradient(180deg,#141414,#0a0a0a);
  border-bottom:1px solid #222;
}
header h1 { font-size:2rem; }

/* SECTIONS */
.section { padding:20px; border-bottom:1px solid #1a1a1a; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* CARDS */
.card {
  background:#111;
  padding:20px;
  border-radius:16px;
}

/* INPUTS */
.card input, .card button, .card textarea {
  width:100%;
  padding:16px;
  margin-top:10px;
  border-radius:14px;
  background:#111;
  color:white;
  border:1px solid #333;
  font-size:1rem;
}

button { min-height:50px; }

/* REMOVE NUMBER SQUARE */
input[type=number] {
  width:70px;
  height:40px;
  text-align:center;
  font-size:1rem;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
  -moz-appearance:textfield;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
  -webkit-appearance:none;
  margin:0;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  display:block;
  overflow-x:auto;
}
th, td {
  padding:10px;
  border-bottom:1px solid #333;
}

/* BRACKETS */
#brackets {
  display:flex;
  gap:30px;
  justify-content:center;
}
.bracket {
  background:#111;
  padding:15px;
  border-radius:12px;
  min-width:280px;
  width:100%;
}
.match {
  background:#222;
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.match span {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:5px;
}

/* MOBILE */
@media (max-width:768px){
  .grid { grid-template-columns:1fr; }
  #brackets { flex-direction:column; }
}

/* ADMIN */
#adminPanel { display:none; }

</style>
</head>

<body>

<header>
<h1>Gorilla Tag Tournaments</h1>
</header>

<!-- REGISTER -->
<div class="section grid">
<div class="card" style="grid-column: span 2;">
<h2>Register</h2>
<input id="email" placeholder="Email">
<input id="team" placeholder="Team Name">
<button onclick="connectDiscord()">Connect Discord</button>
<button onclick="register()">Register</button>
</div>
</div>

<!-- BRACKETS -->
<div class="section">
<h2>Bracket</h2>
<div id="brackets">
<div class="bracket">
<h3>Winner</h3>
<div id="winnerBracket"></div>
</div>
<div class="bracket">
<h3>Loser</h3>
<div id="loserBracket"></div>
</div>
</div>
</div>

<!-- ADMIN -->
<div class="section">
<div class="card">
<input id="adminPass" placeholder="Admin Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="adminPanel" class="section">

<div class="card">
<button onclick="toggleEdit()">Edit ScoreBoard</button>
<button onclick="clearTeams()">Clear Teams</button>
<button onclick="createTournament()">Create Tournament</button>
</div>

<table id="table"></table>

</div>

<script>
let data = JSON.parse(localStorage.getItem("teams")) || [];
let currentTournament = JSON.parse(localStorage.getItem("tournament")) || null;

let isAdmin = false;
let editing = false;

function save(){
  localStorage.setItem("teams", JSON.stringify(data));
  localStorage.setItem("tournament", JSON.stringify(currentTournament));
}

function generateId(){
  return Date.now()+""+Math.floor(Math.random()*1000);
}

/* REGISTER */
function connectDiscord(){
  alert("Discord Connected (mock)");
}

function register(){
  const email = document.getElementById("email").value;
  const team = document.getElementById("team").value || "No Name";

  if(!email) return alert("Enter email");

  data.push({id:generateId(), email, team});
  save();
  loadTable();
  generateMatches();
  updateBrackets();
}

/* ADMIN */
function login(){
  if(document.getElementById("adminPass").value === "admin"){
    isAdmin = true;
    document.getElementById("adminPanel").style.display="block";
    loadTable();
    updateBrackets();
  }
}

function toggleEdit(){
  editing = !editing;
  updateBrackets();
}

/* TABLE */
function loadTable(){
  const t = document.getElementById("table");
  t.innerHTML = "<tr><th>Team</th><th>Email</th></tr>";
  data.forEach(d=>{
    t.innerHTML += `<tr><td>${d.team}</td><td>${d.email}</td></tr>`;
  });
}

/* TOURNAMENT */
function createTournament(){
  currentTournament = {matches:[]};
  generateMatches();
  save();
  updateBrackets();
}

function clearTeams(){
  data=[];
  currentTournament=null;
  save();
  loadTable();
  updateBrackets();
}

/* MATCHES */
function generateMatches(){
  if(!currentTournament) return;
  currentTournament.matches=[];

  for(let i=0;i<data.length;i+=2){
    currentTournament.matches.push({
      id:generateId(),
      team1:data[i]?.id,
      team2:data[i+1]?.id || null,
      score1:0,
      score2:0
    });
  }
  save();
}

/* BRACKETS */
function updateBrackets(){
  const w = document.getElementById("winnerBracket");
  w.innerHTML="";

  if(!currentTournament) return;

  currentTournament.matches.forEach(m=>{
    const t1 = data.find(x=>x.id===m.team1);
    const t2 = data.find(x=>x.id===m.team2);

    const div = document.createElement("div");
    div.className="match";

    const input1 = document.createElement("input");
    input1.type="number";
    input1.value=m.score1;
    input1.disabled=!editing;
    input1.oninput=()=>{ m.score1=parseInt(input1.value)||0; save(); };

    const input2 = document.createElement("input");
    input2.type="number";
    input2.value=m.score2;
    input2.disabled=!editing || !t2;
    input2.oninput=()=>{ m.score2=parseInt(input2.value)||0; save(); };

    const span = document.createElement("span");
    span.innerText = (t1?.team||"TBD")+" ";
    span.appendChild(input1);
    span.appendChild(document.createTextNode(" vs "+(t2?.team||"BYE")+" "));
    if(t2) span.appendChild(input2);

    div.appendChild(span);
    w.appendChild(div);
  });
}

/* INIT */
loadTable();
updateBrackets();
</script>

</body>
</html>
